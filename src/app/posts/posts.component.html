<div class="post container border  p-2  position-relative col-xl-8 col-md-6 col-12">
    <div class="row mt-4">
      <div class="img-box ml-4">
        <img [src]="account.Image" class="rounded-circle"  height="80px" width="80px">
      </div>
      <div class=" col-12 p-4">
        <mat-form-field appearance="fill" class="col-12">
          <mat-label>Write Your Post ?</mat-label>
          <textarea matInput class="mb-2" rows="10"></textarea>
        </mat-form-field>
      </div>
      <div class=" col-12">
        <button type="button" mat-flat-button class="btn btn-secondary ml-auto d-block">Post<mat-icon class="mb-1 ml-1">add_circle</mat-icon></button>
      </div>
    </div>
</div>

<hr class="col-md-6 mt-5">





<app-post *ngFor="let post of posts" [post] = "post"></app-post>
